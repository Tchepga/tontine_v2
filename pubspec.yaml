name: tontine_v2
description: "Tontine grass field app."

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 2.0.8+8

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  cookie_jar: ^4.0.9
  file_picker: ^11.0.2
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_svg: ^2.3.0
  flutter_local_notifications: ^21.0.0
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_quill: ^11.5.0
  get_storage: ^2.1.1
  http: ^1.6.0
  http_interceptor: ^3.0.0
  http_parser: ^4.1.2
  intl: ^0.20.2
  intl_phone_field: ^3.2.0
  logging: ^1.3.0
  open_file: ^3.5.11
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  share_plus: ^12.0.2
  table_calendar: ^3.2.0
  url_launcher: ^6.3.2
  web_socket_channel: ^3.0.3
  socket_io_client: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    # Add assets from the images directory to the application.
    - assets/images/
    - .env.local
    - .env.production

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/calebasse2.png"
  adaptive_icon_background: "#42a5f5"
  adaptive_icon_foreground: "assets/images/calebasse2.png"
  remove_alpha_ios: true
