name: CI/CD — Tests & Déploiement Stores

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# ─── Variables globales ────────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: '3.38.10'
  JAVA_VERSION: '17'
  RUBY_VERSION: '3.2'

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — TESTS (bloque le déploiement si échec)
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  test:
    name: 🧪 Tests Flutter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyse statique
        run: flutter analyze --no-fatal-infos

      - name: Tests unitaires & widgets
        run: flutter test --coverage --reporter=expanded

      # Même formule que l’ancien python (Σ compteurs DA / nb entrées DA). Ne bloque jamais le job.
      - name: Rapport couverture (lcov)
        shell: bash
        run: |
          set -euo pipefail
          LCOV="coverage/lcov.info"
          GOAL="${COVERAGE_GOAL_PERCENT:-70}"
          if [[ ! -f "$LCOV" ]]; then
            echo "::warning::Fichier $LCOV absent — la step « Tests » doit réussir avec --coverage"
            exit 0
          fi
          read -r pct hits total <<< "$(awk -F',' '
            /^DA:/ { t++; h += ($2 == "" ? 0 : $2 + 0) }
            END {
              if (t > 0) printf "%.1f %d %d\n", 100 * h / t, h, t
              else print "0.0 0 0"
            }
          ' "$LCOV")"
          echo "Couverture (lcov, métrique historique): ${pct}% (Σ hits=${hits} / ${total} entrées DA)"
          echo "Objectif référence: ${GOAL}%"
          if awk -v p="$pct" -v g="$GOAL" 'BEGIN { exit !(p + 0 < g + 0) }'; then
            echo "::warning::Couverture ${pct}% sous l'objectif ${GOAL}%"
          fi
          exit 0
        env:
          COVERAGE_GOAL_PERCENT: "70"

# ══════════════════════════════════════════════════════════════════════════════
# JOB 2 — DÉPLOIEMENT ANDROID (uniquement sur master, après tests OK)
# ══════════════════════════════════════════════════════════════════════════════
  deploy-android:
    name: 🤖 Android → Play Store (internal)
    runs-on: ubuntu-latest
    needs: test  # ← bloqué si les tests échouent
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    outputs:
      play_uploaded: ${{ steps.check_android.outputs.upload }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Si un secret manque : job vert + notice (plus d’erreur « ANDROID_KEYSTORE_BASE64 vide »).
      - name: Secrets Android présents ?
        id: check_android
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          PLAY_JSON: ${{ secrets.PLAY_STORE_JSON_KEY }}
          STORE_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          miss=""
          [ -z "${KS:-}" ] && miss="${miss} ANDROID_KEYSTORE_BASE64"
          [ -z "${PLAY_JSON:-}" ] && miss="${miss} PLAY_STORE_JSON_KEY"
          [ -z "${STORE_PW:-}" ] && miss="${miss} ANDROID_KEYSTORE_PASSWORD"
          [ -z "${KEY_PW:-}" ] && miss="${miss} ANDROID_KEY_PASSWORD"
          [ -z "${KEY_ALIAS:-}" ] && miss="${miss} ANDROID_KEY_ALIAS"
          if [ -n "$miss" ]; then
            echo "upload=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Déploiement Play Store ignoré — secrets manquants :$miss"
            echo "::notice::Ajoutez les secrets dans le dépôt GitHub : Settings → Secrets and variables → Actions. ANDROID_KEYSTORE_BASE64 = sortie base64 du fichier .jks sur une seule ligne."
            exit 0
          fi
          echo "upload=true" >> "$GITHUB_OUTPUT"

      - name: Setup Java ${{ env.JAVA_VERSION }}
        if: steps.check_android.outputs.upload == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        if: steps.check_android.outputs.upload == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Décoder le keystore Android
        if: steps.check_android.outputs.upload == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/tontine_release.jks
          sz=$(wc -c < android/app/tontine_release.jks)
          test "$sz" -gt 100 || { echo "::error::Keystore décodé trop petit (${sz} o)"; exit 1; }
          file android/app/tontine_release.jks || true

      - name: Créer le fichier key.properties
        if: steps.check_android.outputs.upload == 'true'
        env:
          STORE_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          printf '%s\n' \
            "storePassword=${STORE_PW}" \
            "keyPassword=${KEY_PW}" \
            "keyAlias=${KEY_ALIAS}" \
            "storeFile=tontine_release.jks" \
            > android/key.properties

      - name: Vérifier le keystore (keytool)
        if: steps.check_android.outputs.upload == 'true'
        env:
          STORE_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          keytool -list -keystore android/app/tontine_release.jks -storepass "$STORE_PW" </dev/null

      - name: Flutter pub get
        if: steps.check_android.outputs.upload == 'true'
        run: flutter pub get

      - name: Build AAB release
        if: steps.check_android.outputs.upload == 'true'
        run: flutter build appbundle --release --dart-define=ENV=production

      - name: Upload vers Play Store (internal track)
        if: steps.check_android.outputs.upload == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: fr.devcoorp.tontine_v2
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Nettoyage secrets locaux
        if: always() && steps.check_android.outputs.upload == 'true'
        run: |
          rm -f android/app/tontine_release.jks
          rm -f android/key.properties

# ══════════════════════════════════════════════════════════════════════════════
# JOB 3 — DÉPLOIEMENT iOS (uniquement sur master, après tests OK)
# ══════════════════════════════════════════════════════════════════════════════
  deploy-ios:
    name: 🍎 iOS → TestFlight
    runs-on: macos-latest
    needs: test  # ← bloqué si les tests échouent
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    # hashFiles() n'est pas autorisé dans job.if — on détecte fastlane/Fastfile après checkout.
    outputs:
      fastlane_used: ${{ steps.fastlane.outputs.present }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Détection fastlane/Fastfile
        id: fastlane
        run: |
          if [ -f fastlane/Fastfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Pas de fastlane/Fastfile — étapes iOS ignorées (ajoutez Fastlane ou utilisez Codemagic)."
          fi

      - name: Setup Flutter
        if: steps.fastlane.outputs.present == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Ruby
        if: steps.fastlane.outputs.present == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: fastlane

      - name: Install Fastlane
        if: steps.fastlane.outputs.present == 'true'
        run: |
          cd fastlane
          bundle install

      - name: Flutter pub get
        if: steps.fastlane.outputs.present == 'true'
        run: flutter pub get

      - name: Build iOS (sans codesign — Fastlane gère)
        if: steps.fastlane.outputs.present == 'true'
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=ENV=production

      - name: Sync certificats via Match & Upload TestFlight
        if: steps.fastlane.outputs.present == 'true'
        env:
          MATCH_PASSWORD:     ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL:      ${{ secrets.MATCH_GIT_URL }}
          APPLE_ID:           ${{ secrets.APPLE_ID }}
          ASC_KEY_ID:         ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:      ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT:    ${{ secrets.ASC_KEY_CONTENT }}
          APP_STORE_TEAM_ID:  ${{ secrets.APP_STORE_TEAM_ID }}
          DEVELOPER_TEAM_ID:  ${{ secrets.DEVELOPER_TEAM_ID }}
        run: |
          cd fastlane
          bundle exec fastlane ios deploy

# ══════════════════════════════════════════════════════════════════════════════
# JOB 4 — RAPPORT FINAL
# ══════════════════════════════════════════════════════════════════════════════
  notify:
    name: 📊 Rapport déploiement
    runs-on: ubuntu-latest
    needs: [deploy-android, deploy-ios]
    if: always() && github.ref == 'refs/heads/master'
    steps:
      - name: Résumé
        run: |
          echo "## Résultat du déploiement" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy-android.outputs.play_uploaded }}" = "true" ]; then
            echo "✅ **Android** → Play Store internal track" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.deploy-android.result }}" = "success" ]; then
            echo "⏭️ **Android** → Non publié (secrets Actions manquants — voir notice dans le job deploy-android)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Android** → Échec (${{ needs.deploy-android.result }})" >> $GITHUB_STEP_SUMMARY
          fi
          ios="${{ needs.deploy-ios.result }}"
          fl="${{ needs.deploy-ios.outputs.fastlane_used }}"
          if [ "$ios" = "success" ] && [ "$fl" = "true" ]; then
            echo "✅ **iOS** → TestFlight" >> $GITHUB_STEP_SUMMARY
          elif [ "$ios" = "success" ] && [ "$fl" != "true" ]; then
            echo "⏭️ **iOS** → Ignoré (pas de fastlane/Fastfile — Codemagic ou ajout Fastlane au repo)" >> $GITHUB_STEP_SUMMARY
          elif [ "$ios" = "skipped" ]; then
            echo "⏭️ **iOS** → Job ignoré" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **iOS** → Échec ($ios)" >> $GITHUB_STEP_SUMMARY
          fi
