name: CI/CD — Tests & Déploiement Stores

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# ─── Variables globales ────────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: '3.29.3'
  JAVA_VERSION: '17'
  RUBY_VERSION: '3.2'

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — TESTS (bloque le déploiement si échec)
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  test:
    name: 🧪 Tests Flutter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyse statique
        run: flutter analyze --no-fatal-infos

      - name: Tests unitaires & widgets
        run: flutter test --coverage --reporter=expanded

      - name: Vérification couverture minimale (70%)
        run: |
          COVERAGE=$(python3 -c "
          import re, sys
          lines = open('coverage/lcov.info').read()
          hits = sum(int(x) for x in re.findall(r'^DA:\d+,(\d+)', lines, re.M))
          total = len(re.findall(r'^DA:', lines, re.M))
          pct = hits / total * 100 if total else 0
          print(f'{pct:.1f}')
          sys.exit(0 if pct >= 70 else 1)
          ")
          echo "Couverture : ${COVERAGE}%"

# ══════════════════════════════════════════════════════════════════════════════
# JOB 2 — DÉPLOIEMENT ANDROID (uniquement sur master, après tests OK)
# ══════════════════════════════════════════════════════════════════════════════
  deploy-android:
    name: 🤖 Android → Play Store (internal)
    runs-on: ubuntu-latest
    needs: test  # ← bloqué si les tests échouent
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: fastlane

      - name: Install Fastlane
        run: |
          cd fastlane
          bundle install

      - name: Décoder le keystore Android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/tontine_release.jks

      - name: Créer le fichier key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../app/tontine_release.jks
          EOF

      - name: Créer le service account Play Store
        run: |
          mkdir -p fastlane/secrets
          echo '${{ secrets.PLAY_STORE_JSON_KEY }}' > fastlane/secrets/play-store-key.json

      - name: Flutter pub get
        run: flutter pub get

      - name: Build AAB release
        run: flutter build appbundle --release --dart-define=ENV=production

      - name: Upload vers Play Store (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: fr.devcoorp.tontine_v2
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Nettoyage secrets locaux
        if: always()
        run: |
          rm -f android/app/tontine_release.jks
          rm -f android/key.properties
          rm -f fastlane/secrets/play-store-key.json

# ══════════════════════════════════════════════════════════════════════════════
# JOB 3 — DÉPLOIEMENT iOS (uniquement sur master, après tests OK)
# ══════════════════════════════════════════════════════════════════════════════
  deploy-ios:
    name: 🍎 iOS → TestFlight
    runs-on: macos-latest
    needs: test  # ← bloqué si les tests échouent
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: fastlane

      - name: Install Fastlane
        run: |
          cd fastlane
          bundle install

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS (sans codesign — Fastlane gère)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=ENV=production

      - name: Sync certificats via Match & Upload TestFlight
        env:
          MATCH_PASSWORD:     ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL:      ${{ secrets.MATCH_GIT_URL }}
          APPLE_ID:           ${{ secrets.APPLE_ID }}
          ASC_KEY_ID:         ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:      ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT:    ${{ secrets.ASC_KEY_CONTENT }}
          APP_STORE_TEAM_ID:  ${{ secrets.APP_STORE_TEAM_ID }}
          DEVELOPER_TEAM_ID:  ${{ secrets.DEVELOPER_TEAM_ID }}
        run: |
          cd fastlane
          bundle exec fastlane ios deploy

# ══════════════════════════════════════════════════════════════════════════════
# JOB 4 — RAPPORT FINAL
# ══════════════════════════════════════════════════════════════════════════════
  notify:
    name: 📊 Rapport déploiement
    runs-on: ubuntu-latest
    needs: [deploy-android, deploy-ios]
    if: always() && github.ref == 'refs/heads/master'
    steps:
      - name: Résumé
        run: |
          echo "## Résultat du déploiement" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy-android.result }}" = "success" ]; then
            echo "✅ **Android** → Play Store internal track" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Android** → Échec (${{ needs.deploy-android.result }})" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.deploy-ios.result }}" = "success" ]; then
            echo "✅ **iOS** → TestFlight" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **iOS** → Échec (${{ needs.deploy-ios.result }})" >> $GITHUB_STEP_SUMMARY
          fi
